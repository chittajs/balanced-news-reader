<style>
  :root{
    --bg:#0d1418; --panel:#121c22; --panel2:#16232a; --line:#1e2d35;
    --grid:#1c2a31; --ink:#e8eef0; --muted:#7d929c; --faint:#4d5f68;
    --left:#5b8dd6; --center:#8a94a0; --right:#d0574e; --state:#b07fd0;
    --focus:#63c2b5;
    --sans:"IBM Plex Sans",system-ui,-apple-system,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1760px;margin:0 auto;padding:0 24px 80px}

  /* masthead */
  header.top{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;
    padding:22px 0 16px;border-bottom:1px solid var(--line);margin-bottom:22px}
  .mark{font-family:var(--mono);font-weight:600;font-size:12px;letter-spacing:.28em;
    color:var(--focus);text-transform:uppercase}
  h1{font-size:26px;font-weight:700;margin:2px 0 0;letter-spacing:-.01em}
  .byline{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.02em}
  .byline a{color:var(--focus);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s}
  .byline a:hover{border-bottom-color:var(--focus)}
  .dateline{font-family:var(--mono);font-size:11px;color:var(--muted);
    margin-left:auto;text-align:right;line-height:1.6}
  .dateline b{color:var(--ink);font-weight:500}

  /* wide: [collapsible topics] | atlas (left half) | articles (right half) */
  .layout{display:grid;grid-template-columns:200px 1fr 1fr;gap:24px;align-items:start;
    transition:grid-template-columns .2s ease}
  .layout.collapsed{grid-template-columns:46px 1fr 1fr}
  .mapcol{grid-column:2;grid-row:1;position:sticky;top:16px}
  .list{grid-column:3;grid-row:1}
  /* mid: topics rail (or thin) + stacked map/articles */
  @media(max-width:1100px){
    .layout{grid-template-columns:180px 1fr}
    .layout.collapsed{grid-template-columns:46px 1fr}
    .mapcol{grid-column:2;grid-row:1;position:static}
    .list{grid-column:2;grid-row:2;margin-top:22px}}
  /* narrow: everything stacked, rail becomes a horizontal row */
  @media(max-width:820px){
    .layout,.layout.collapsed{grid-template-columns:1fr}
    .mapcol,.list{grid-column:1}
    .mapcol{grid-row:auto}.list{grid-row:auto;margin-top:0}}

  /* topic rail */
  nav.topics{grid-column:1;grid-row:1;position:sticky;top:16px;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:8px;display:flex;flex-direction:column;gap:2px;overflow:hidden}
  .railtoggle{display:flex;align-items:center;gap:9px;background:none;border:0;cursor:pointer;
    color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;padding:6px 8px;border-radius:6px;width:100%}
  .railtoggle:hover{color:var(--ink);background:var(--panel2)}
  .railtoggle .ico{font-size:15px;line-height:1;color:var(--focus)}
  .topiclist{display:flex;flex-direction:column;gap:2px;margin-top:4px}
  .layout.collapsed nav.topics{padding:8px 4px}
  .layout.collapsed .topiclist,.layout.collapsed .railtoggle .tlabel{display:none}
  .topic{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:9px 10px;border:0;background:none;color:var(--muted);cursor:pointer;
    font-family:var(--sans);font-size:14px;text-align:left;border-radius:6px;
    border-left:2px solid transparent;transition:color .15s,background .15s}
  .topic:hover{color:var(--ink);background:var(--panel2)}
  .topic.active{color:var(--ink);background:var(--panel2);border-left-color:var(--focus);font-weight:600}
  .topic .n{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .topic.active .n{color:var(--focus)}
  @media(max-width:820px){
    nav.topics{position:static;overflow:visible}
    .topiclist{flex-direction:row;flex-wrap:wrap;gap:6px}
    .layout.collapsed .topiclist{display:flex}
    .railtoggle{display:none}
    .topic{border-left:0;border:1px solid var(--line)}
    .topic.active{border-color:var(--focus)}}

  /* map */
  .mapcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px 10px;margin-bottom:0}
  .mapcard h2,.list h2{font-family:var(--mono);font-size:10px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--faint);margin:0 0 10px;font-weight:500}
  .map{width:100%;height:auto;display:block}
  .grat{stroke:var(--grid);stroke-width:.4;fill:none}
  .frame{stroke:var(--line);stroke-width:.8;fill:none}
  .ocean{fill:#0b141a}
  .land{fill:#18262e;stroke:#2b4049;stroke-width:.3;stroke-linejoin:round}
  .pin{cursor:pointer}
  .pin circle.dot{fill:var(--focus);fill-opacity:.16;stroke:var(--focus);
    stroke-width:1;transition:fill-opacity .15s}
  .pin circle.core{fill:var(--focus)}
  .pin:hover circle.dot{fill-opacity:.34}
  .pin.active circle.dot{fill-opacity:.42}
  .pin.dim{opacity:.32}
  .pin text{font-family:var(--mono);font-size:5.4px;fill:var(--muted);
    text-anchor:middle;letter-spacing:.04em}
  .pin.active text{fill:var(--ink)}
  .pin .cnt{font-size:4.4px;fill:var(--faint)}
  @media(prefers-reduced-motion:no-preference){
    .pin.active circle.dot{animation:pulse 2.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{fill-opacity:.42}50%{fill-opacity:.7}}}
  .filterbar{display:flex;align-items:center;gap:10px;font-family:var(--mono);
    font-size:11px;color:var(--muted);min-height:20px;margin-top:4px}
  .chip{border:1px solid var(--focus);color:var(--focus);border-radius:20px;
    padding:2px 10px;background:none;cursor:pointer;font-family:var(--mono);font-size:11px}
  .chip:hover{background:rgba(99,194,181,.1)}

  /* cluster list */
  .list h2{margin-bottom:12px}
  .cluster{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    margin-bottom:12px;overflow:hidden;transition:border-color .15s}
  .cluster:hover{border-color:#2a3d47}
  .cluster.open{border-color:var(--focus)}
  .chead{padding:15px 18px;cursor:pointer;display:grid;
    grid-template-columns:1fr auto;gap:4px 16px;align-items:start}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--muted);
    text-transform:uppercase;grid-column:1/-1;margin-bottom:2px}
  .tag b{color:var(--focus);font-weight:500}
  .ctitle{font-size:17px;font-weight:600;line-height:1.35;letter-spacing:-.01em}
  .csum{grid-column:1/-1;color:var(--muted);font-size:13.5px;margin-top:3px}
  .meta{display:flex;flex-direction:column;align-items:flex-end;gap:7px;
    font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap}
  .regiontags{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .rtag{border:1px solid var(--line);border-radius:3px;padding:1px 5px;color:var(--muted)}
  /* lean spectrum bar = how the spectrum covered it (real proportion) */
  .spectrum{display:flex;height:5px;border-radius:3px;overflow:hidden;
    width:120px;grid-column:1/-1;margin-top:11px;background:var(--panel2)}
  .spectrum i{display:block;height:100%}
  .seg-left{background:var(--left)} .seg-center{background:var(--center)}
  .seg-right{background:var(--right)} .seg-state{background:var(--state)}
  .count-line{grid-column:1/-1;font-family:var(--mono);font-size:10.5px;
    color:var(--faint);margin-top:6px}

  /* sources */
  .sources{border-top:1px solid var(--line);padding:6px 18px 14px;
    display:none;background:var(--panel2)}
  .cluster.open .sources{display:block}
  .leangroup{margin-top:12px}
  .leanhead{font-family:var(--mono);font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .swatch{width:9px;height:9px;border-radius:2px;display:inline-block}
  .src{display:flex;gap:10px;align-items:baseline;padding:6px 0;
    border-bottom:1px solid rgba(30,45,53,.6);text-decoration:none}
  .src:last-child{border-bottom:0}
  .src:hover .src-title{color:var(--focus)}
  .src-outlet{font-family:var(--mono);font-size:11px;color:var(--muted);
    min-width:150px;flex-shrink:0}
  .src-title{font-size:13.5px;flex:1}
  .badge{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;
    padding:1px 5px;border-radius:3px;text-transform:uppercase;flex-shrink:0}
  .b-state{background:rgba(176,127,208,.16);color:var(--state);border:1px solid var(--state)}
  .b-public{color:var(--muted);border:1px solid var(--line)}
  .b-private{color:var(--faint);border:1px solid var(--line)}
  .arrow{font-family:var(--mono);color:var(--faint);font-size:11px}

  .empty{border:1px dashed var(--line);border-radius:10px;padding:34px;
    text-align:center;color:var(--muted);font-size:14px}
  .empty .mono{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:8px}
  .loader{padding:60px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px}
  input[type=file]{display:none}
  .fileload{border:1px dashed var(--line);border-radius:8px;padding:14px;
    text-align:center;color:var(--muted);font-size:13px;margin-top:14px}
  .fileload label{color:var(--focus);cursor:pointer;text-decoration:underline}

  /* legend */
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;
    color:var(--muted);margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .legend span{display:flex;align-items:center;gap:5px}
  .paywallctl{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .paytoggle{display:inline-flex;align-items:center;gap:8px;background:none;
    border:1px solid var(--line);border-radius:20px;padding:5px 12px;cursor:pointer;
    color:var(--muted);font-family:var(--mono);font-size:11px;transition:.15s}
  .paytoggle:hover{color:var(--ink);border-color:var(--faint)}
  .paytoggle .dot{width:8px;height:8px;border-radius:50%;background:var(--faint);transition:.15s}
  .paytoggle.on{color:var(--focus);border-color:var(--focus)}
  .paytoggle.on .dot{background:var(--focus);box-shadow:0 0 6px var(--focus)}
  .badge.b-pay{color:#e0a24a;border:1px solid #e0a24a}
</style>

function proj(lat,lng){return {x:lng+180,y:90-lat};} // equirectangular, viewBox 0..360 x 0..180

function fmtDate(iso){
  try{const d=new Date(iso);
    return d.toLocaleString(undefined,{month:"short",day:"numeric",
      hour:"2-digit",minute:"2-digit"});}catch(e){return iso;}
}

function load(data){
  state.data=data;
  state.topic=(data.topics||[]).find(t=>data.clusters.some(c=>c.topic===t))||data.topics[0];
  document.getElementById("dateline").innerHTML=
    `wire snapshot<br><b>${fmtDate(data.generated_at)}</b><br>${data.clusters.length} stories · non-personalized`;
  render();
}

function counts(){ // per-topic cluster counts respecting region filter
  const m={};
  for(const t of state.data.topics) m[t]=0;
  for(const c of state.data.clusters){
    if(state.region && !c.regions.includes(state.region)) continue;
    m[c.topic]=(m[c.topic]||0)+1;
  }
  return m;
}

function render(){
  const d=state.data, c=counts();
  const app=document.getElementById("app");
  app.className="";
  app.innerHTML=`
    <div class="layout ${state.collapsed?'collapsed':''}">
      <nav class="topics">
        <button class="railtoggle" id="railToggle" aria-label="Toggle topics">
          <span class="ico">☰</span><span class="tlabel">Topics</span></button>
        <div class="topiclist">
        ${d.topics.map(t=>`<button class="topic ${t===state.topic?'active':''}"
           data-topic="${t}"><span>${t}</span><span class="n">${c[t]||0}</span></button>`).join("")}
        </div>
      </nav>
      <div class="mapcol">
        <div class="mapcard">
          <h2>Regions — pin size = stories in view</h2>
          ${mapSVG()}
          <div class="filterbar" id="filterbar">${
            state.region
              ? `Filtered to <b style="color:var(--ink)">&nbsp;${regionName(state.region)}</b>
                 <button class="chip" id="clearRegion">clear ✕</button>`
              : `Click a region to filter · click again to clear`
          }</div>
          <div class="legend">
            ${LEANS.map(([k,label])=>`<span><i class="swatch" style="background:var(--${k})"></i>${label}</span>`).join("")}
          </div>
          <div class="paywallctl">
            <button class="paytoggle ${state.hidePay?'on':''}" id="payToggle">
              <span class="dot"></span>${state.hidePay?'Hiding paywalled sources':'Hide paywalled sources'}</button>
          </div>
        </div>
      </div>
      <div class="list">
        <h2>${state.topic}${state.region?` · ${regionName(state.region)}`:""} — ranked by coverage breadth + recency</h2>
        <div id="clusters">${clustersHTML()}</div>
      </div>
    </div>`;
  wire();
}

function regionName(id){const r=state.data.regions.find(r=>r.id===id);return r?r.name:id;}

  const grat=[];
  for(let lng=-180;lng<=180;lng+=30){const {x}=proj(0,lng);
    grat.push(`<line class="grat" x1="${x}" y1="0" x2="${x}" y2="180"/>`);}
  for(let lat=-60;lat<=60;lat+=30){const {y}=proj(lat,0);
    grat.push(`<line class="grat" x1="0" y1="${y}" x2="360" y2="${y}"/>`);}
  const pins=R.map(r=>{
    const p=proj(r.lat,r.lng);
    const rad=6+ (r.count/max)*10;
    const active=state.region===r.id;
    const dim=state.region&&!active;
    return `<g class="pin ${active?'active':''} ${dim?'dim':''}" data-region="${r.id}">
      <circle class="dot" cx="${p.x}" cy="${p.y}" r="${rad}"/>
      <circle class="core" cx="${p.x}" cy="${p.y}" r="2"/>
      <text x="${p.x}" y="${p.y-rad-2}">${r.name.toUpperCase()}</text>
      <text class="cnt" x="${p.x}" y="${p.y+rad+5}">${r.count}</text>
    </g>`;}).join("");
  return `<svg class="map" viewBox="-6 -6 372 192" role="img"
      aria-label="World map of story volume by region">
    <rect class="ocean" x="0" y="0" width="360" height="180" rx="3"/>
    <path class="land" d="${LAND_PATH}"/>
    <rect class="frame" x="0" y="0" width="360" height="180" rx="3"/>
    ${grat.join("")}${pins}</svg>`;
}

function visibleSources(c){
  return state.hidePay ? c.sources.filter(s=>s.access!=="paywall") : c.sources;
}
function clustersHTML(){
  let cl=state.data.clusters.filter(c=>c.topic===state.topic);
  if(state.region) cl=cl.filter(c=>c.regions.includes(state.region));
  if(state.hidePay) cl=cl.filter(c=>visibleSources(c).length>0);
  if(!cl.length) return `<div class="empty">No stories in this slice.
     <div class="mono">Clear filters, pick another topic,
     or widen the pipeline window.</div></div>`;
  return cl.map(c=>{
    const open=state.open.has(c.id);
    const vis=visibleSources(c);
    const byLean={};
    for(const s of vis){(byLean[s.lean]=byLean[s.lean]||[]).push(s);}
    const total=vis.length;
    const nOutlets=new Set(vis.map(s=>s.outlet)).size;
    const bar=LEANS.map(([k])=>{const n=(byLean[k]||[]).length;
      return n?`<i class="${LEANCLASS[k]}" style="width:${100*n/total}%"></i>`:"";}).join("");
    const spectrumLeans=Object.keys(byLean).filter(k=>k!=="state").length;
    const spread=spectrumLeans>=3?"full spectrum":spectrumLeans+" of L/C/R";
    return `<div class="cluster ${open?'open':''}" data-id="${c.id}">
      <div class="chead" data-toggle="${c.id}">
        <div class="tag">${c.topic} · grouped on <b>${c.label}</b></div>
        <div class="ctitle">${esc(c.title)}</div>
        <div class="meta">
          <div class="regiontags">${c.regions.map(r=>`<span class="rtag">${r}</span>`).join("")}</div>
        </div>
        ${c.summary&&c.summary!==c.title?`<div class="csum">${esc(c.summary)}</div>`:""}
        <div class="spectrum" title="coverage by lean">${bar}</div>
        <div class="count-line">${nOutlets} outlets · ${spread} · updated ${fmtDate(c.last_seen)}</div>
      </div>
      <div class="sources">${sourcesHTML(byLean)}</div>
    </div>`;
  }).join("");
}

function sourcesHTML(byLean){
  return LEANS.map(([k,label])=>{
    const rows=byLean[k];if(!rows||!rows.length)return "";
    return `<div class="leangroup">
      <div class="leanhead"><i class="swatch" style="background:var(--${k})"></i>${label} · ${rows.length}</div>
      ${rows.map(s=>`<a class="src" href="${s.url}" target="_blank" rel="noopener">
        <span class="src-outlet">${esc(s.outlet)}</span>
        <span class="src-title">${esc(s.title)}</span>
        ${s.access==="paywall"?`<span class="badge b-pay" title="subscription required">🔒 paywall</span>`:""}
        <span class="badge b-${s.ownership}">${s.ownership}</span>
        <span class="arrow">↗</span></a>`).join("")}
    </div>`;}).join("");
}

function esc(s){return (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}

function wire(){
  const rt=document.getElementById("railToggle");
  if(rt)rt.onclick=()=>{state.collapsed=!state.collapsed;
    document.querySelector(".layout").classList.toggle("collapsed",state.collapsed);};
  const pt=document.getElementById("payToggle");
  if(pt)pt.onclick=()=>{state.hidePay=!state.hidePay;render();};
  document.querySelectorAll(".topic").forEach(b=>b.onclick=()=>{
    state.topic=b.dataset.topic;state.open.clear();render();});
  document.querySelectorAll(".pin").forEach(g=>g.onclick=()=>{
    const r=g.dataset.region;state.region=state.region===r?null:r;render();});
  const cr=document.getElementById("clearRegion");
  if(cr)cr.onclick=()=>{state.region=null;render();};
  document.querySelectorAll("[data-toggle]").forEach(h=>h.onclick=()=>{
    const id=+h.dataset.toggle;
    state.open.has(id)?state.open.delete(id):state.open.add(id);render();});
}

// --- load data.json (needs a local server; file:// blocks fetch) -------------
fetch("data.json").then(r=>{if(!r.ok)throw 0;return r.json();}).then(load)
  .catch(()=>{
    document.getElementById("app").innerHTML=
      `<div class="empty">Couldn't auto-load <b>data.json</b>.
       <div class="mono">Serve this folder: <b>python -m http.server</b> then open
       http://localhost:8000/reader.html</div>
       <div class="fileload">…or <label for="fp">load data.json manually</label>
       <input type="file" id="fp" accept="application/json"></div></div>`;
    document.getElementById("fp").onchange=e=>{
      const f=e.target.files[0];if(!f)return;const rd=new FileReader();
      rd.onload=()=>{try{load(JSON.parse(rd.result));}catch(err){alert("Invalid JSON");}};
      rd.readAsText(f);};
  });
</script>
